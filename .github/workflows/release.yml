name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pantry:
    name: pantry
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Dependencies
        run: bun install

      - name: Build Native Binary
        run: bun run build:core

      - name: Extract Version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Stage Binary for Publish
        run: |
          mkdir -p .publish/bin
          cp packages/zig/zig-out/bin/craft .publish/bin/craft
          cat > .publish/package.json << PACKAGE
          {
            "name": "craft",
            "domain": "craft-native.org",
            "version": "${{ steps.version.outputs.version }}",
            "description": "Build desktop apps with web languages, powered by Zig",
            "license": "MIT",
            "bin": { "craft": "./bin/craft" },
            "files": ["bin"]
          }
          PACKAGE

      - name: Publish to Pantry Registry
        working-directory: .publish
        run: pantry publish --access public
        env:
          PANTRY_REGISTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}

  npm:
    name: npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Publish to npm
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: stacksjs/action-releaser@v1.2.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: discord-notification
    needs: [pantry, npm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        if: hashFiles('.github/actions/discord-notify/action.yml') != ''
        with:
          title: "Release — ${{ needs.pantry.result == 'success' && needs.npm.result == 'success' && 'Published' || 'Failed' }}"
          description: "Tag: ${{ github.ref_name }}"
          status: ${{ needs.pantry.result == 'success' && needs.npm.result == 'success' && 'success' || 'failure' }}
          fields: |
            [
              {"name": "Tag", "value": "${{ github.ref_name }}", "inline": true},
              {"name": "Pantry", "value": "${{ needs.pantry.result }}", "inline": true},
              {"name": "npm", "value": "${{ needs.npm.result }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
