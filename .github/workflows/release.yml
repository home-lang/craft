name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  S3_BUCKET: pantry-registry
  AWS_REGION: us-east-1

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: macos-15, name: darwin-arm64, deps: '' }
          - { os: ubuntu-latest, name: linux-x86-64, deps: 'sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev' }
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install System Dependencies
        if: matrix.platform.deps != ''
        run: ${{ matrix.platform.deps }}

      - name: Install Dependencies
        run: bun install

      - name: Build Native Binary
        run: bun run build:core

      - name: Extract Version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Package and upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.platform.name }}"
          DOMAIN="craft-native.org"
          SLUG="craft-native.org"
          BINARY="packages/zig/zig-out/bin/craft"

          echo "Publishing $DOMAIN v$VERSION for $PLATFORM"
          ls -la "$BINARY"
          file "$BINARY"

          # Create tarball with bin/ structure (like other pantry packages)
          STAGING=$(mktemp -d)
          mkdir -p "$STAGING/bin"
          cp "$BINARY" "$STAGING/bin/craft"
          chmod +x "$STAGING/bin/craft"
          TARBALL="${SLUG}-${VERSION}.tar.gz"
          tar -czf "/tmp/$TARBALL" -C "$STAGING" .
          SHA256=$(shasum -a 256 "/tmp/$TARBALL" | cut -d' ' -f1)

          echo "Tarball: $TARBALL ($(du -h /tmp/$TARBALL | cut -f1))"
          echo "SHA256: $SHA256"

          # Upload tarball
          S3_KEY="binaries/${DOMAIN}/${VERSION}/${PLATFORM}/${TARBALL}"
          aws s3 cp "/tmp/$TARBALL" "s3://$S3_BUCKET/$S3_KEY" --region $AWS_REGION

          # Upload checksum
          echo "$SHA256" > "/tmp/${TARBALL}.sha256"
          aws s3 cp "/tmp/${TARBALL}.sha256" "s3://$S3_BUCKET/${S3_KEY}.sha256" --region $AWS_REGION

          echo "Uploaded: s3://$S3_BUCKET/$S3_KEY"

      - name: Update metadata.json
        if: matrix.platform.name == 'darwin-arm64'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOMAIN="craft-native.org"

          # Create/update metadata.json
          METADATA=$(cat <<METAJSON
          {
            "name": "$DOMAIN",
            "latestVersion": "$VERSION",
            "versions": {
              "$VERSION": {
                "platforms": {
                  "darwin-arm64": {
                    "tarball": "binaries/$DOMAIN/$VERSION/darwin-arm64/$DOMAIN-$VERSION.tar.gz",
                    "uploadedAt": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
                  },
                  "linux-x86-64": {
                    "tarball": "binaries/$DOMAIN/$VERSION/linux-x86-64/$DOMAIN-$VERSION.tar.gz",
                    "uploadedAt": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
                  }
                }
              }
            },
            "updatedAt": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          }
          METAJSON
          )

          echo "$METADATA" | aws s3 cp - "s3://$S3_BUCKET/binaries/$DOMAIN/metadata.json" \
            --content-type application/json --region $AWS_REGION

          echo "Updated metadata: s3://$S3_BUCKET/binaries/$DOMAIN/metadata.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: craft-${{ matrix.platform.name }}
          path: packages/zig/zig-out/bin/craft

  npm:
    name: npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Publish to npm
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: stacksjs/action-releaser@v1.2.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: discord-notification
    needs: [build, npm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        if: hashFiles('.github/actions/discord-notify/action.yml') != ''
        with:
          title: "Release — ${{ needs.build.result == 'success' && needs.npm.result == 'success' && 'Published' || 'Failed' }}"
          description: "Tag: ${{ github.ref_name }}"
          status: ${{ needs.build.result == 'success' && needs.npm.result == 'success' && 'success' || 'failure' }}
          fields: |
            [
              {"name": "Tag", "value": "${{ github.ref_name }}", "inline": true},
              {"name": "Build", "value": "${{ needs.build.result }}", "inline": true},
              {"name": "npm", "value": "${{ needs.npm.result }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
