name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pantry:
    name: pantry (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: macos-15, name: darwin-arm64, deps: '' }
          - { os: ubuntu-latest, name: linux-x86-64, deps: 'sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev' }
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry (provides Bun, Zig, etc.)
        uses: home-lang/pantry/packages/action@main

      - name: Install System Dependencies
        if: matrix.platform.deps != ''
        run: ${{ matrix.platform.deps }}

      - name: Install Dependencies
        run: bun install

      - name: Extract Version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Build Native Binary
        run: bun run build:core

      # ── Cross-compile all targets ────────────────────────────────
      - name: Cross-compile additional targets (macOS)
        if: runner.os == 'macOS'
        working-directory: packages/zig
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SDK_PATH="$(xcrun --show-sdk-path)"
          mkdir -p zig-out/cross

          echo "::group::Cross-compile darwin-x64"
          zig build -Doptimize=ReleaseSafe -Dversion="$VERSION" -Dtarget=x86_64-macos -Dmacos-sdk="$SDK_PATH"
          mkdir -p zig-out/cross/darwin-x64 && cp zig-out/bin/craft zig-out/cross/darwin-x64/craft
          echo "::endgroup::"

          # Restore native ARM64 binary
          zig build -Doptimize=ReleaseSafe -Dversion="$VERSION"

      - name: Cross-compile additional targets (Linux)
        if: runner.os == 'Linux'
        working-directory: packages/zig
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p zig-out/cross

          # Cross-compile targets that may lack platform-specific system libraries
          # (WebView2Loader for Windows, gtk/webkit for arm64 Linux, etc.)
          for target_spec in \
            "x86_64-windows:windows-x64:craft.exe" \
            "aarch64-linux:linux-arm64:craft" \
            "x86_64-freebsd:freebsd-x64:craft" \
            "aarch64-freebsd:freebsd-arm64:craft"; do
            IFS=: read -r zig_target dir_name bin_name <<< "$target_spec"
            echo "::group::Cross-compile $dir_name"
            if zig build -Doptimize=ReleaseSafe -Dversion="$VERSION" -Dtarget="$zig_target"; then
              mkdir -p "zig-out/cross/$dir_name" && cp "zig-out/bin/$bin_name" "zig-out/cross/$dir_name/$bin_name"
              echo "Built $dir_name"
            else
              echo "::warning::$dir_name cross-compile skipped (missing system libraries)"
            fi
            echo "::endgroup::"
          done

          # Restore native linux-x64 binary
          zig build -Doptimize=ReleaseSafe -Dversion="$VERSION"

      # ── macOS Code Signing & Notarization ──────────────────────────
      - name: Import signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements scripts/entitlements.plist \
            packages/zig/zig-out/bin/craft
          codesign --verify --deep --strict packages/zig/zig-out/bin/craft
          echo "Binary signed successfully"

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd packages/zig/zig-out/bin
          zip -r craft.zip craft
          xcrun notarytool submit craft.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || echo "Notarization skipped (may not have credentials)"
          xcrun stapler staple craft || true
          rm craft.zip

      # ── Publish & Release ──────────────────────────────
      # Pantry action handles everything:
      # 1. Publishes to pantry registry (zig package)
      # 2. Auto-packages binaries from zig-out/ into platform-named zips
      # 3. Creates/updates GitHub release with all artifacts + changelog
      - name: Publish & Release
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'
          publish: 'zig'
          token: ${{ secrets.PANTRY_TOKEN }}
          release: 'true'
          release-changelog: CHANGELOG.md
          release-token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

  npm:
    name: npm
    needs: [pantry]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry (provides Bun, Zig, etc.)
        uses: home-lang/pantry/packages/action@main
      - name: Install Dependencies
        run: bun install

      - name: Publish to npm
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    name: discord-notification
    needs: [pantry, npm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        if: hashFiles('.github/actions/discord-notify/action.yml') != ''
        with:
          title: "Release ${{ github.ref_name }} — ${{ needs.pantry.result == 'success' && needs.npm.result == 'success' && 'Published' || (needs.pantry.result == 'cancelled' || needs.npm.result == 'cancelled') && 'Cancelled' || 'Failed' }}"
          description: "craft ${{ github.ref_name }} has been released"
          status: ${{ needs.pantry.result == 'success' && needs.npm.result == 'success' && 'success' || (needs.pantry.result == 'cancelled' || needs.npm.result == 'cancelled') && 'warning' || 'failure' }}
          fields: |
            [
              {"name": "Tag", "value": "`${{ github.ref_name }}`", "inline": true},
              {"name": "Actor", "value": "${{ github.actor }}", "inline": true},
              {"name": "Binaries", "value": "${{ needs.pantry.result == 'success' && '✅ Published' || '❌ Failed' }}", "inline": true},
              {"name": "npm Packages", "value": "${{ needs.npm.result == 'success' && '✅ Published' || '❌ Failed' }}", "inline": true},
              {"name": "Release", "value": "[View on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
