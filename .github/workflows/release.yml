name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  binary:
    name: Build & Publish Binary (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: macos-15, name: darwin-arm64 }
          - { os: ubuntu-latest, name: linux-x86-64 }
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Build Native Binary
        run: bun run build:core

      - name: Extract Version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish Binary to Pantry Registry
        run: pantry publish:binary --domain craft-native.org --version ${{ steps.version.outputs.version }} --binary ./packages/zig/zig-out/bin/craft --platform ${{ matrix.platform.name }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  npm:
    name: npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Publish to npm
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: stacksjs/action-releaser@v1.2.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: discord-notification
    needs: [binary, npm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        if: hashFiles('.github/actions/discord-notify/action.yml') != ''
        with:
          title: "Release — ${{ needs.binary.result == 'success' && needs.npm.result == 'success' && 'Published' || 'Failed' }}"
          description: "Tag: ${{ github.ref_name }}"
          status: ${{ needs.binary.result == 'success' && needs.npm.result == 'success' && 'success' || 'failure' }}
          fields: |
            [
              {"name": "Tag", "value": "${{ github.ref_name }}", "inline": true},
              {"name": "Binary", "value": "${{ needs.binary.result }}", "inline": true},
              {"name": "npm", "value": "${{ needs.npm.result }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
