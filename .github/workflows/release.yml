name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  S3_BUCKET: pantry-registry
  AWS_REGION: us-east-1

jobs:
  pantry:
    name: pantry (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: macos-15, name: darwin-arm64, deps: '' }
          - { os: ubuntu-latest, name: linux-x86-64, deps: 'sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev' }
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install System Dependencies
        if: matrix.platform.deps != ''
        run: ${{ matrix.platform.deps }}

      - name: Install Dependencies
        run: bun install

      - name: Build Native Binary
        run: bun run build:core

      - name: Extract Version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      # ── macOS Code Signing & Notarization ──────────────────────────
      - name: Import signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements scripts/entitlements.plist \
            packages/zig/zig-out/bin/craft
          codesign --verify --deep --strict packages/zig/zig-out/bin/craft
          echo "Binary signed successfully"

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd packages/zig/zig-out/bin
          zip -r craft.zip craft
          xcrun notarytool submit craft.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || echo "Notarization skipped (may not have credentials)"
          xcrun stapler staple craft || true
          rm craft.zip

      # ── Publish to Pantry S3 Registry ──────────────────────────────
      - name: Publish to Pantry Registry
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.platform.name }}"
          DOMAIN="craft-native.org"
          BINARY="packages/zig/zig-out/bin/craft"

          echo "Publishing $DOMAIN v$VERSION for $PLATFORM"
          ls -la "$BINARY"
          file "$BINARY"

          STAGING=$(mktemp -d)
          mkdir -p "$STAGING/bin"
          cp "$BINARY" "$STAGING/bin/craft"
          chmod +x "$STAGING/bin/craft"
          TARBALL="${DOMAIN}-${VERSION}.tar.gz"
          tar -czf "/tmp/$TARBALL" -C "$STAGING" .
          SHA256=$(shasum -a 256 "/tmp/$TARBALL" | cut -d' ' -f1)

          echo "Tarball: $TARBALL ($(du -h /tmp/$TARBALL | cut -f1)), SHA256: $SHA256"

          S3_KEY="binaries/${DOMAIN}/${VERSION}/${PLATFORM}/${TARBALL}"
          aws s3 cp "/tmp/$TARBALL" "s3://$S3_BUCKET/$S3_KEY" --region $AWS_REGION
          echo "$SHA256" > "/tmp/${TARBALL}.sha256"
          aws s3 cp "/tmp/${TARBALL}.sha256" "s3://$S3_BUCKET/${S3_KEY}.sha256" --region $AWS_REGION

      - name: Update metadata
        if: matrix.platform.name == 'darwin-arm64'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOMAIN="craft-native.org"

          cat <<METAJSON | aws s3 cp - "s3://$S3_BUCKET/binaries/$DOMAIN/metadata.json" --content-type application/json --region $AWS_REGION
          {
            "name": "$DOMAIN",
            "latestVersion": "$VERSION",
            "versions": {
              "$VERSION": {
                "platforms": {
                  "darwin-arm64": {
                    "tarball": "binaries/$DOMAIN/$VERSION/darwin-arm64/$DOMAIN-$VERSION.tar.gz",
                    "uploadedAt": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
                  },
                  "linux-x86-64": {
                    "tarball": "binaries/$DOMAIN/$VERSION/linux-x86-64/$DOMAIN-$VERSION.tar.gz",
                    "uploadedAt": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
                  }
                }
              }
            },
            "updatedAt": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          }
          METAJSON

      # ── Package & Upload Artifact ────────────────────────────────
      - name: Package binary
        run: |
          mkdir -p dist
          PLATFORM="${{ matrix.platform.name }}"
          case "$PLATFORM" in
            darwin-arm64)  ZIP_NAME="craft-darwin-arm64.zip" ;;
            linux-x86-64)  ZIP_NAME="craft-linux-x64.zip" ;;
          esac
          (cd packages/zig/zig-out/bin && zip -r "../../../../dist/$ZIP_NAME" craft)
          echo "Packaged: $ZIP_NAME ($(du -h dist/$ZIP_NAME | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: craft-${{ matrix.platform.name }}
          path: dist/*.zip

  # ── GitHub Release with binaries & changelog ───────────────────
  release:
    name: GitHub Release
    needs: pantry
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          ls -la
          sha256sum *.zip > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: stacksjs/action-releaser@v1.2.9
        with:
          files: |
            dist/craft-darwin-arm64.zip
            dist/craft-linux-x64.zip
            dist/checksums.sha256
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

  npm:
    name: npm
    needs: pantry
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Publish to npm
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    name: discord-notification
    needs: [release, npm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        if: hashFiles('.github/actions/discord-notify/action.yml') != ''
        with:
          title: "Release ${{ github.ref_name }} — ${{ needs.release.result == 'success' && needs.npm.result == 'success' && 'Published' || (needs.release.result == 'cancelled' || needs.npm.result == 'cancelled') && 'Cancelled' || 'Failed' }}"
          description: "craft ${{ github.ref_name }} has been released"
          status: ${{ needs.release.result == 'success' && needs.npm.result == 'success' && 'success' || (needs.release.result == 'cancelled' || needs.npm.result == 'cancelled') && 'warning' || 'failure' }}
          fields: |
            [
              {"name": "Tag", "value": "`${{ github.ref_name }}`", "inline": true},
              {"name": "Actor", "value": "${{ github.actor }}", "inline": true},
              {"name": "Binaries", "value": "${{ needs.release.result == 'success' && '✅ Published' || '❌ Failed' }}", "inline": true},
              {"name": "npm Packages", "value": "${{ needs.npm.result == 'success' && '✅ Published' || '❌ Failed' }}", "inline": true},
              {"name": "Release", "value": "[View on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
