name: Mobile Builds

on:
  push:
    branches:
      - main
    paths:
      - 'packages/zig/src/mobile/**'
      - 'packages/zig/templates/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/zig/src/mobile/**'
      - 'packages/zig/templates/**'
      - '.github/workflows/mobile.yml'
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Build iOS'
        required: false
        default: true
        type: boolean
      build_android:
        description: 'Build Android'
        required: false
        default: true
        type: boolean

concurrency:
  group: mobile-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  ios-build:
    name: iOS Build
    runs-on: macos-14
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Zig
        uses: home-lang/pantry/packages/action@main
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Build iOS library
        working-directory: packages/zig
        run: |
          # Build iOS static libraries using dedicated build steps
          # (not the default target which builds macOS executables)
          eval "$(pantry env)" && zig build build-ios -Doptimize=ReleaseSafe -Dmacos-sdk="$(xcrun --sdk iphoneos --show-sdk-path)"
          eval "$(pantry env)" && zig build build-ios-simulator -Doptimize=ReleaseSafe -Dmacos-sdk="$(xcrun --sdk iphonesimulator --show-sdk-path)"

      - name: Generate iOS project
        run: |
          mkdir -p ios-build
          # Copy iOS template
          cp -r packages/zig/templates/ios/* ios-build/

      - name: Install CocoaPods
        if: hashFiles('ios-build/Podfile') != ''
        working-directory: ios-build
        run: pod install

      - name: Build iOS (Debug)
        if: hashFiles('ios-build/*.xcworkspace') != '' || hashFiles('ios-build/*.xcodeproj') != ''
        working-directory: ios-build
        run: |
          xcodebuild \
            -scheme CraftApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Run iOS tests
        if: hashFiles('ios-build/*.xcworkspace') != '' || hashFiles('ios-build/*.xcodeproj') != ''
        working-directory: ios-build
        run: |
          xcodebuild \
            -scheme CraftApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            test \
            CODE_SIGNING_ALLOWED=NO

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_android }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Zig
        uses: home-lang/pantry/packages/action@main
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Zig Android library
        working-directory: packages/zig
        run: |
          eval "$(pantry env)" && zig build -Dtarget=aarch64-linux-android

      - name: Generate Android project
        run: |
          mkdir -p android-build
          # Copy Android template
          cp -r packages/zig/templates/android/* android-build/

      - name: Build Android (Debug)
        if: hashFiles('android-build/gradlew') != ''
        working-directory: android-build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Run Android tests
        if: hashFiles('android-build/gradlew') != ''
        working-directory: android-build
        run: |
          ./gradlew test

      - name: Run Android instrumented tests
        if: hashFiles('android-build/gradlew') != ''
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          working-directory: android-build
          script: ./gradlew connectedAndroidTest

  mobile-integration:
    name: Mobile Integration
    needs: [ios-build, android-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check build results
        run: |
          echo "iOS Build: ${{ needs.ios-build.result }}"
          echo "Android Build: ${{ needs.android-build.result }}"

      - name: Report status
        if: needs.ios-build.result == 'failure' || needs.android-build.result == 'failure'
        run: |
          echo "::warning::Mobile builds had issues. Check individual job logs."
