name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  zig-core:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          version: '0.9.10'
          packages: ziglang.org@0.16.0-dev.2984+cb7d2b056

      - name: Setup Zig (Windows fallback)
        if: runner.os == 'Windows'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2984+cb7d2b056

      - name: Verify Zig installation
        run: zig version

      - name: Cache Zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            packages/zig/.zig-cache
          key: ${{ runner.os }}-zig-master-${{ hashFiles('packages/zig/build.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-master-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build Zig core
        working-directory: packages/zig
        run: zig build

      - name: Check binary size
        if: runner.os == 'Linux'
        run: |
          ls -lh packages/zig/zig-out/bin/
          size packages/zig/zig-out/bin/craft || true

  typescript-sdk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          version: '0.9.10'

      - name: Install dependencies
        run: bun install

      - name: Type check TypeScript SDK
        working-directory: packages/typescript
        run: bun run typecheck

      - name: Run TypeScript SDK tests with coverage
        working-directory: packages/typescript
        run: bun test --coverage || true

      - name: Generate coverage summary
        working-directory: packages/typescript
        run: |
          echo "## TypeScript SDK Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            cat coverage/coverage-summary.json | jq -r '.total | "- Lines: \(.lines.pct)%\n- Statements: \(.statements.pct)%\n- Functions: \(.functions.pct)%\n- Branches: \(.branches.pct)%"' >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build TypeScript SDK
        working-directory: packages/typescript
        run: bun run build

      - name: Type check create-craft
        working-directory: packages/create-craft
        run: bun run typecheck

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          version: '0.9.10'
          packages: ziglang.org@0.16.0-dev.2984+cb7d2b056

      - name: Check Zig formatting
        working-directory: packages/zig
        run: zig fmt --check src/ build.zig

  integration:
    runs-on: ubuntu-latest
    needs: [zig-core, typescript-sdk]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          version: '0.9.10'
          packages: ziglang.org@0.16.0-dev.2984+cb7d2b056

      - name: Install dependencies
        run: bun install

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build Zig core
        working-directory: packages/zig
        run: zig build

      - name: Build TypeScript SDK
        working-directory: packages/typescript
        run: bun run build

      - name: Test TypeScript SDK with binary
        working-directory: packages/typescript
        run: bun test || true

      - name: Verify create-craft
        working-directory: packages/create-craft
        run: bun run typecheck
