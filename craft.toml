# Craft Configuration File (DEMO)
#
# This file is a reference for the keys recognized by the native packaging
# pipeline (`packages/zig/src/package.zig`). The repo root copy is here as
# documentation only — the Zig side searches the **app's** working directory
# for craft.toml / craft.json / package.jsonc / package.json (in that order)
# at runtime, so editing this file does not affect the workspace itself.
#
# For app config that runs in TypeScript (window dimensions, hot reload,
# tray, etc.) use `craft.config.ts` and the `createApp({ ... })` builder.
#
# This file demonstrates all available configuration options.

[window]
# Window title
title = "My Craft App"

# Window dimensions
width = 1200
height = 800

# Window behavior
resizable = true
frameless = false
transparent = false
always_on_top = false

[webview]
# Enable WebKit Developer Tools (right-click > Inspect Element)
dev_tools = true

# Custom user agent (optional)
# user_agent = "MyApp/1.0"
